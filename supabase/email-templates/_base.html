<!--
  PLANTILLA BASE — NO USAR DIRECTAMENTE
  Copia esta estructura para crear nuevas plantillas. El contenido editable
  va en {{ .CONTENT }} (no es Go template real; es solo recordatorio).

  Restricciones de email HTML:
   - Solo inline styles (Gmail/Outlook ignoran <style> a menudo)
   - Estructura table-based para Outlook 2007+
   - Sin imagenes externas para el logo (proxy/cache las rompe)
   - Max width 600px (estandar email)
   - Colores fallback en cada estilo
-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArteGenIA</title>
</head>
<body style="margin:0;padding:0;background:#f8f9fc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f8f9fc;padding:32px 16px;">
    <tr>
      <td align="center">

        <!-- Container -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(15,15,30,0.06);">

          <!-- Header con logo -->
          <tr>
            <td style="padding:32px 32px 24px 32px;text-align:left;border-bottom:1px solid rgba(15,15,30,0.06);">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding-right:10px;vertical-align:middle;">
                    <!-- Logo AG inline (no imagen externa) -->
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td width="36" height="36" align="center" valign="middle" style="background:linear-gradient(135deg,#facc15,#f97316);border-radius:9px;color:#000000;font-weight:900;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;letter-spacing:-0.5px;">AG</td>
                      </tr>
                    </table>
                  </td>
                  <td style="vertical-align:middle;">
                    <span style="font-size:18px;font-weight:700;color:#0e0e14;letter-spacing:-0.3px;">Arte <span style="color:#f59e0b;">Gen</span></span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body — CONTENT GOES HERE -->
          <tr>
            <td style="padding:32px;color:#0e0e14;">
              <!-- TEMPLATE-SPECIFIC CONTENT REPLACES THIS BLOCK -->
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 32px;background:#f8f9fc;border-top:1px solid rgba(15,15,30,0.06);text-align:center;">
              <p style="margin:0 0 8px 0;font-size:12px;color:#4b5563;line-height:1.5;">
                ArteGenIA · Diseña flyers profesionales con IA
              </p>
              <p style="margin:0;font-size:11px;color:#6b7280;">
                <a href="https://artegenia.vercel.app/privacidad" style="color:#7c3aed;text-decoration:none;">Privacidad</a>
                &nbsp;·&nbsp;
                <a href="https://artegenia.vercel.app/terminos" style="color:#7c3aed;text-decoration:none;">Términos</a>
                &nbsp;·&nbsp;
                <a href="https://artegenia.vercel.app/cookies" style="color:#7c3aed;text-decoration:none;">Cookies</a>
              </p>
              <p style="margin:12px 0 0 0;font-size:10px;color:#9ca3af;">
                Si no esperabas este email, puedes ignorarlo sin problema.
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
